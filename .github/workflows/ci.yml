name: CI — Lint, Smoke & E2E Testing Suite

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: PEP8 Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        continue-on-error: true
        run: |
          flake8 . \
            --exclude=datasets/,frontend/,scripts/,assets/,tests/ \
            --max-line-length=100 \
            --ignore=E501,W503,E302,E303,W291,W293,F401,E128,E501

  smoke-test:
    name: Pipeline Smoke Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Cache NLTK data
        uses: actions/cache@v4
        with:
          path: ~/nltk_data
          key: nltk-${{ runner.os }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('vader_lexicon')"

      - name: Run smoke test
        continue-on-error: true
        run: python test_pipeline.py
        env:
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_KEY: "placeholder"

  # FIX FOR ISSUE #493: New automated job guarantees full test suite runs on every incoming PR
  e2e-tests:
    name: End-to-End API Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio anyio

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('vader_lexicon')"

      - name: Execute pytest Checkpoint
        env:
          SUPABASE_URL: "https://placeholder.supabase.co"
          SUPABASE_ANON_KEY: "placeholder"
          SUPABASE_SERVICE_KEY: "placeholder"
          REDIS_URL: "redis://localhost:6379/0"
          DATA_PATH: "data/products.csv"
        run: |
          pytest tests/test_e2e_api_suite.py -v --tb=short
