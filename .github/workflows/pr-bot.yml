name: GSSoC PR Bot

on:
  pull_request_target:
    types: [opened, reopened, closed]
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  welcome-pr:
    if: github.event_name == 'pull_request_target' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Welcome PR and add mandatory labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const sender = pr.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;
            const isFirstTime = pr.author_association === 'FIRST_TIME_CONTRIBUTOR' || pr.author_association === 'NONE';
            const body = pr.body || '';
            const title = pr.title.toLowerCase();

            const mandatoryLabels = ['gssoc:approved', 'mentor:leonagoel', 'status:review-needed'];

            if (title.startsWith('feat') || title.startsWith('feature')) mandatoryLabels.push('type:feature');
            else if (title.startsWith('fix') || title.startsWith('bug')) mandatoryLabels.push('type:bug');
            else if (title.startsWith('docs')) mandatoryLabels.push('type:docs');
            else if (title.startsWith('refactor')) mandatoryLabels.push('type:refactor');
            else if (title.startsWith('test')) mandatoryLabels.push('type:testing');
            else if (title.startsWith('chore') || title.startsWith('ci')) mandatoryLabels.push('type:devops');

            await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: mandatoryLabels });

            const hasWhatChanged = body.toLowerCase().includes('what changed');
            const hasWhy = body.toLowerCase().includes('why');
            const hasHowToTest = body.toLowerCase().includes('how to test');
            const hasRelatedIssue = /closes #|fixes #|related issue/i.test(body);
            const allGood = hasWhatChanged && hasWhy && hasHowToTest && hasRelatedIssue;

            let checklist = '';
            checklist += (hasWhatChanged ? 'YES' : 'NO') + ' - What changed section\n';
            checklist += (hasWhy ? 'YES' : 'NO') + ' - Why section\n';
            checklist += (hasHowToTest ? 'YES' : 'NO') + ' - How to test section\n';
            checklist += (hasRelatedIssue ? 'YES' : 'NO') + ' - Related issue linked\n';

            let msg = isFirstTime
              ? 'Welcome to Hybrid Recommender, @' + sender + '! This is your first contribution here!\n\n'
              : 'Thanks for your PR, @' + sender + '!\n\n';

            msg += 'Labels added: gssoc:approved | mentor:leonagoel | status:review-needed\n\n';
            msg += 'PR Description Checklist:\n' + checklist + '\n';
            msg += allGood ? 'PR description looks complete!\n\n' : 'Some required sections are missing. Please update your PR description.\n\n';
            msg += 'What happens next:\n';
            msg += '1. @leonagoel will review your changes\n';
            msg += '2. CI checks must pass\n';
            msg += '3. Once approved, this PR will be auto-merged\n\n';
            msg += 'Please respond to review comments within 48 hours.';

            try {
              await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg });
            } catch(e) {
              console.log('Could not post welcome comment:', e.message);
            }

            try {
              await github.rest.pulls.requestReviewers({ owner, repo, pull_number: prNumber, reviewers: ['leonagoel'] });
            } catch(e) {
              console.log('Could not request review:', e.message);
            }

  auto-merge-on-approval:
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR on approval
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const reviewer = context.payload.review.user.login;

            try {
              await github.rest.issues.removeLabel({ owner, repo, issue_number: prNumber, name: 'status:review-needed' });
            } catch(e) {}

            try {
              await github.rest.issues.addLabels({ owner, repo, issue_number: prNumber, labels: ['status:approved'] });
            } catch(e) {}

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: context.payload.pull_request.title + ' (#' + prNumber + ')'
              });
              console.log('PR merged successfully!');
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: 'Merged! Approved by @' + reviewer + '. Points will reflect at next 4 AM IST leaderboard refresh.'
                });
              } catch(e) {
                console.log('Could not post merge comment:', e.message);
              }
            } catch(e) {
              console.log('Merge failed:', e.message);
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: prNumber,
                  body: 'Approved by @' + reviewer + '! Could not auto-merge: ' + e.message + '\n\nPlease merge manually.'
                });
              } catch(e2) {
                console.log('Could not post failure comment:', e2.message);
              }
            }

  notify-rebase-on-merge:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Notify all open PRs to rebase
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const mergedPR = context.payload.pull_request;

            const openPRs = await github.paginate(github.rest.pulls.list, {
              owner, repo, state: 'open', per_page: 100
            });

            for (const pr of openPRs) {
              if (pr.number === mergedPR.number) continue;
              try {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pr.number,
                  body: '⚠️ Main branch was just updated!\n\n'
                    + 'PR #' + mergedPR.number + ' ("' + mergedPR.title + '") was just merged into `main`.\n\n'
                    + 'Please rebase your branch to avoid conflicts:\n'
                    + '```\n'
                    + 'git fetch origin\n'
                    + 'git rebase origin/main\n'
                    + 'git push --force-with-lease\n'
                    + '```\n\n'
                    + 'Keeping your branch up to date prevents merge conflicts. 🚀'
                });
              } catch(e) {
                console.log('Could not notify PR #' + pr.number + ':', e.message);
              }
            }